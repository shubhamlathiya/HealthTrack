<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient-Doctor Communication</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            background-color: #f8f9fa;
        }
        .chat-container {
            margin: 20px auto;
            max-width: 900px;
            padding: 15px;
        }
        .chat-box {
            height: 400px;
            overflow-y: auto;
            background-color: #fff;
            border: 1px solid #ddd;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .chat-message {
            margin-bottom: 15px;
            padding: 10px;
            border-radius: 8px;
            display: inline-block;
            max-width: 70%;
        }
        .message-patient {
            background-color: #d1f7c4;
            text-align: left;
            margin-right: auto;
        }
        .message-doctor {
            background-color: #e7e7e7;
            text-align: right;
            margin-left: auto;
        }
        .chat-input {
            display: flex;
            gap: 10px;
        }
        .chat-input textarea {
            width: 100%;
            height: 50px;
        }
    </style>
</head>
<body>
    <div class="container chat-container">
        <h3 class="text-center mb-4">Patient-Doctor Communication</h3>

        <!-- Chat Box -->
        <div class="chat-box" id="chatBox">
            <!-- Example Messages -->
            <div class="chat-message message-patient">
                <strong>Patient:</strong> Hi Doctor, I have a question about my medication.
            </div>
            <div class="chat-message message-doctor">
                <strong>Doctor:</strong> Sure! What would you like to know?
            </div>
            <div class="chat-message message-patient">
                <strong>Patient:</strong> Is it okay to take the medicine after a heavy meal?
            </div>
            <div class="chat-message message-doctor">
                <strong>Doctor:</strong> It is best to take it before meals for better absorption.
            </div>
        </div>

        <!-- Message Input -->
        <div class="chat-input">
            <textarea id="messageInput" class="form-control" placeholder="Type your message here..."></textarea>
            <button id="sendMessage" class="btn btn-primary">Send</button>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        $(document).ready(function () {
            // Send message functionality
            $("#sendMessage").click(function () {
                const message = $("#messageInput").val();
                if (message.trim() !== "") {
                    const newMessage = `
                        <div class="chat-message message-patient">
                            <strong>Patient:</strong> ${message}
                        </div>
                    `;
                    $("#chatBox").append(newMessage); // Append the new message
                    $("#chatBox").scrollTop($("#chatBox")[0].scrollHeight); // Scroll to the bottom
                    $("#messageInput").val(""); // Clear the input field
                }
            });

            // Allow pressing Enter to send a message
            $("#messageInput").keypress(function (e) {
                if (e.which === 13) {
                    $("#sendMessage").click();
                }
            });
        });
    </script>
</body>
</html>
