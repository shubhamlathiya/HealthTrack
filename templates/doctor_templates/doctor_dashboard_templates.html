<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
        }
        .container-fluid {
            padding-left: 0;
        }
        .sidebar {
            height: 100vh;
            background-color: #f8f9fa;
            padding-top: 20px;
        }
        .sidebar a {
            display: block;
            color: #000;
            padding: 10px 15px;
            text-decoration: none;
            border-radius: 4px;
            margin-bottom: 5px;
        }
        .sidebar a:hover {
            background-color: #007bff;
            color: #fff;
        }
        .content-area {
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <div class="col-md-3 col-lg-2 sidebar">
                <h4 class="text-center">Doctor Dashboard</h4>
                <div class="d-flex flex-column">
                    <a href="#" id="viewAppointments" class="active">View Appointments</a>
                    <a href="#" id="searchPatientData">Search Patient Data</a>
                    <a href="#" id="viewProfile">Profile</a>
                </div>
            </div>

            <!-- Main Content Area -->
            <div class="col-md-9 col-lg-10 content-area">
                <div id="appointments" class="content-section">
                    <h3>Appointments</h3>
                    <p>Here you can view your upcoming appointments.</p>
                </div>

                <div id="searchPatient" class="content-section" style="display: none;">
                    <h3>Search Patient Data</h3>
                    <form>
                        <div class="mb-3">
                            <label for="patientId" class="form-label">Enter Patient ID</label>
                            <input type="text" id="patientId" class="form-control">
                        </div>
                        <button type="submit" class="btn btn-primary">Search</button>
                    </form>
                    <div id="patientInfo" style="margin-top: 20px;">
                        <!-- Patient info will appear here after search -->
                    </div>
                </div>

                <div id="profile" class="content-section" style="display: none;">
                    <h3>Doctor Profile</h3>
                    <p>Here you can view and update your profile information.</p>
                    <form>
                        <div class="mb-3">
                            <label for="doctorName" class="form-label">Name</label>
                            <input type="text" id="doctorName" class="form-control" value="Dr. John Doe" readonly>
                        </div>
                        <div class="mb-3">
                            <label for="doctorEmail" class="form-label">Email</label>
                            <input type="email" id="doctorEmail" class="form-control" value="dr.johndoe@example.com" readonly>
                        </div>
                        <button type="button" class="btn btn-warning">Edit Profile</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Menu navigation functionality
        $(document).ready(function() {
            // Show appointments by default
            $("#viewAppointments").click(function() {
                $(".content-section").hide();
                $("#appointments").show();
                setActiveMenuItem($(this));
            });

            // Show search patient data section
            $("#searchPatientData").click(function() {
                $(".content-section").hide();
                $("#searchPatient").show();
                setActiveMenuItem($(this));
            });

            // Show profile section
            $("#viewProfile").click(function() {
                $(".content-section").hide();
                $("#profile").show();
                setActiveMenuItem($(this));
            });

            // Set the active class for the menu items
            function setActiveMenuItem(element) {
                $(".sidebar a").removeClass("active");
                element.addClass("active");
            }

            // Default to "View Appointments"
            setActiveMenuItem($("#viewAppointments"));
        });
    </script>
</body>
</html>
