<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Appointment Management</title>
</head>
<body>
<h2>View Appointments</h2>
<div id="viewMessage"></div>
<div id="appointments">
    <h3>Appointments</h3>
    <ul id="appointmentsList"></ul>
</div>

<script>
    // Fetch patientId from localStorage
    const patientId = localStorage.getItem('patientId');

    // Check if patientId exists in localStorage
    if (!patientId) {
        alert('Patient ID not found. Please log in.');
        window.location.href = '/login'; // Redirect to login page
    }

    // Automatically fetch and display appointments
    async function viewAppointments() {
        const viewMessageElement = document.getElementById('viewMessage');
        const appointmentsElement = document.getElementById('appointments');
        const appointmentsList = document.getElementById('appointmentsList');

        viewMessageElement.textContent = '';
        appointmentsList.innerHTML = '';

        const url = 'http://localhost:5000/patients/view-appointments/' + patientId;

        try {
            const response = await fetch(url, {
                method: 'GET',
                headers: {
                    'Content-Type': 'application/json'
                }
            });

            const data = await response.json();

            if (response.ok) {
                if (data.appointments && data.appointments.length > 0) {
                    data.appointments.forEach(appointment => {
                        const li = document.createElement('li');
                        li.innerHTML = `
                                <strong>Appointment ID:</strong> ${appointment.appointment_id}<br>
                                <strong>Date:</strong> ${appointment.date}<br>
                                <strong>Time:</strong> ${appointment.time}<br>
                                <strong>Reason:</strong> ${appointment.reason}<br>
                                <strong>Status:</strong> ${appointment.status}<br>
                                <strong>Doctor ID:</strong> ${appointment.doctor}<br>
                            `;
                        if (appointment.status === "Scheduled") {
                            const cancelButton = document.createElement('button');
                            cancelButton.textContent = 'Cancel';
                            cancelButton.onclick = () => cancelAppointment(patientId, appointment.appointment_id);
                            li.appendChild(cancelButton);
                        }
                        appointmentsList.appendChild(li);
                    });
                } else {
                    viewMessageElement.style.color = 'red';
                    viewMessageElement.textContent = 'No appointments found.';
                }
            } else {
                viewMessageElement.style.color = 'red';
                viewMessageElement.textContent = data.error || 'Failed to retrieve appointments.';
            }
        } catch (error) {
            viewMessageElement.style.color = 'red';
            viewMessageElement.textContent = 'An error occurred. Please try again.';
        }
    }

    async function cancelAppointment(patientId, appointmentId) {
        const viewMessageElement = document.getElementById('viewMessage');
        viewMessageElement.textContent = '';

        try {
            const response = await fetch('http://localhost:5000/patients/cancel-appointment', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({patient_id: patientId, appointment_id: appointmentId})
            });

            const data = await response.json();

            if (response.ok) {
                viewMessageElement.style.color = 'green';
                viewMessageElement.textContent = data.message || 'Appointment cancelled successfully.';
                viewAppointments(); // Refresh the appointments list
            } else {
                viewMessageElement.style.color = 'red';
                viewMessageElement.textContent = data.error || 'Failed to cancel appointment.';
            }
        } catch (error) {
            viewMessageElement.style.color = 'red';
            viewMessageElement.textContent = 'An error occurred. Please try again.';
        }
    }

    // Call viewAppointments on page load to fetch and display the appointments
    viewAppointments();
</script>
</body>
</html>
